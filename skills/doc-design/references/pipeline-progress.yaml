# doc-design Skill — Pipeline 进度追踪

> 基于 skill-creator v10.1.0 Pipeline 模式设计
> 文件：`references/pipeline-progress.yaml`

## Pipeline 阶段定义

文档生成任务必须按以下阶段顺序执行，不可跳步：

### Stage 1: 需求分析
- **目标**：明确文档类型、受众、用途
- **检查点**：
  - [ ] 确认目标格式（docx/xlsx/pptx/pdf/html/md/tex/epub）
  - [ ] 确认受众（客户/技术团队/公众/学术）
  - [ ] 确认用途（打印/屏幕/分发/归档）
  - [ ] 确认品牌规范（字体/配色/logo）
- **完成标准**：以上 4 项全部确认

### Stage 2: 内容结构
- **目标**：确定文档大纲和页面结构
- **检查点**：
  - [ ] 创建大纲（标题层级 ≤ 3 级）
  - [ ] 确认页面数量（PPT）或章节数（文档）
  - [ ] 确认视觉风格（商务/学术/创意/极简）
- **完成标准**：大纲已确认，风格已选定

### Stage 3: 设计规范
- **目标**：确定配色、字体、布局
- **检查点**：
  - [ ] 配色方案 ≤ 5 种颜色
  - [ ] 字体 ≤ 2 种
  - [ ] 字号层级 ≥ 3 级
  - [ ] 对比度 ≥ 4.5:1
- **完成标准**：设计规范文档已创建

### Stage 4: 内容填充
- **目标**：将内容填入模板
- **检查点**：
  - [ ] 所有文字内容已填入
  - [ ] 所有图片已嵌入
  - [ ] 所有表格已创建
- **完成标准**：内容完整，无占位符

### Stage 5: 视觉润色
- **目标**：对齐、间距、装饰元素
- **检查点**：
  - [ ] 所有元素对齐到网格
  - [ ] 段落间距 > 行间距
  - [ ] 留白 ≥ 50%（PPT）
  - [ ] 装饰元素统一
- **完成标准**：通过视觉审查

### Stage 6: 质量验证
- **目标**：对照验证清单逐项检查
- **检查点**：
  - [ ] 字体种类 ≤ 2 种 ✓
  - [ ] 标题层级清晰 ✓
  - [ ] 颜色对比度 ≥ 4.5:1 ✓
  - [ ] 中英文混排空格正确 ✓
  - [ ] 中文无乱码 ✓
  - [ ] 留白充足 ✓
- **完成标准**：验证清单全部通过

### Stage 7: 输出交付
- **目标**：生成最终文件并交付
- **检查点**：
  - [ ] 文件已生成
  - [ ] 文件大小合理
  - [ ] 已发送到目标平台（飞书/微信/本地）
- **完成标准**：用户确认收到

## 硬性门控规则

1. **Stage 1 未完成** → 不得开始 Stage 2
2. **Stage 3 未完成** → 不得开始 Stage 4
3. **Stage 6 有未通过项** → 不得进入 Stage 7
4. **返工必须回到对应阶段** → 设计问题回 Stage 3，内容问题回 Stage 4

## 使用方式

```yaml
# pipeline-progress.yaml（每次任务自动创建）
task: "商业计划书 PPT"
current_stage: 3
stages:
  1_analysis: {status: done, completed_at: "2026-05-02T22:00:00"}
  2_structure: {status: done, completed_at: "2026-05-02T22:05:00"}
  3_design: {status: in_progress, notes: "配色方案已选，字体待确认"}
  4_content: {status: pending}
  5_polish: {status: pending}
  6_verify: {status: pending}
  7_deliver: {status: pending}
blockers: []
revisions: 0
```
